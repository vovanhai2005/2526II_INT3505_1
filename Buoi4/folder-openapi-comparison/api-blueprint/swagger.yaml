swagger: '2.0'
info:
  title: Book Management API
  version: ''
  description: A simple API to manage a collection of books, for SOA courses demo.
host: 127.0.0.1:5000
basePath: /
schemes:
  - http
paths:
  /api/books:
    get:
      responses:
        '200':
          description: OK
          headers: {}
          examples:
            application/json:
              - id: 1
                title: Clean Code
                author: Robert C. Martin
          schema:
            type: array
            items: {}
      summary: Get all books
      operationId: Get all books
      description: Get all books.
      tags:
        - Books
      parameters: []
      produces:
        - application/json
      consumes: []
    post:
      responses:
        '201':
          description: Book created successfully.
          headers: {}
          examples:
            application/json:
              id: 1
              title: Clean Code
              author: Robert C. Martin
          schema:
            type: object
            properties:
              id:
                type: number
                description: The unique identifier of the book.
              title:
                type: string
                description: The title of the book.
              author:
                type: string
                description: The author of the book.
            required:
              - id
              - title
              - author
        '400':
          description: Bad Request
          headers: {}
          examples:
            text/plain: |+
              Missing title or author.

      summary: Add a new book
      operationId: Add a new book
      description: Add a new book.
      tags:
        - Books
      parameters:
        - name: body
          in: body
          schema:
            type: object
            properties:
              title:
                type: string
                description: The title of the book.
              author:
                type: string
                description: The author of the book.
            required:
              - title
              - author
            example:
              title: Clean Code
              author: Robert C. Martin
      produces:
        - application/json
        - text/plain
      consumes:
        - application/json
  /api/books/{book_id}:
    get:
      responses:
        '200':
          description: The requested book.
          headers: {}
          examples:
            application/json:
              id: 1
              title: Clean Code
              author: Robert C. Martin
          schema:
            type: object
            properties:
              id:
                type: number
                description: The unique identifier of the book.
              title:
                type: string
                description: The title of the book.
              author:
                type: string
                description: The author of the book.
            required:
              - id
              - title
              - author
        '404':
          description: Not Found
          headers: {}
          examples:
            text/plain: |+
              Book not found.

      summary: Get a book by its ID
      operationId: Get a book by its ID
      description: Get a book by its ID.
      tags:
        - Books
      parameters:
        - &ref_0
          name: book_id
          in: path
          description: ID of the book to retrieve, update, or delete.
          required: true
          x-example: '1'
          type: number
      produces:
        - application/json
        - text/plain
      consumes: []
    put:
      responses:
        '200':
          description: Book updated successfully.
          headers: {}
          examples:
            application/json:
              id: 1
              title: Clean Code
              author: Robert C. Martin
          schema:
            type: object
            properties:
              id:
                type: number
                description: The unique identifier of the book.
              title:
                type: string
                description: The title of the book.
              author:
                type: string
                description: The author of the book.
            required:
              - id
              - title
              - author
        '400':
          description: Bad Request
          headers: {}
          examples:
            text/plain: |+
              Missing title or author.

        '404':
          description: Not Found
          headers: {}
          examples:
            text/plain: |+
              Book not found.

      summary: Update an existing book
      operationId: Update an existing book
      description: Update an existing book.
      tags:
        - Books
      parameters:
        - *ref_0
        - name: body
          in: body
          schema:
            type: object
            properties:
              title:
                type: string
                description: The title of the book.
              author:
                type: string
                description: The author of the book.
            required:
              - title
              - author
            example:
              title: Clean Code
              author: Robert C. Martin
      produces:
        - application/json
        - text/plain
      consumes:
        - application/json
    delete:
      responses:
        '204':
          description: No Content
          headers: {}
          examples: {}
        '404':
          description: Not Found
          headers: {}
          examples:
            text/plain: |+
              Book not found.

      summary: Delete a book
      operationId: Delete a book
      description: Delete a book.
      tags:
        - Books
      parameters:
        - *ref_0
      produces:
        - text/plain
      consumes: []
definitions:
  Books Collection: {}
  Single Book: {}
  Book:
    type: object
    required:
      - id
      - title
      - author
    properties:
      id:
        type: number
        example: 1
        description: The unique identifier of the book.
      title:
        type: string
        example: Clean Code
        description: The title of the book.
      author:
        type: string
        example: Robert C. Martin
        description: The author of the book.
  NewBook:
    type: object
    required:
      - title
      - author
    properties:
      title:
        type: string
        example: Clean Code
        description: The title of the book.
      author:
        type: string
        example: Robert C. Martin
        description: The author of the book.
securityDefinitions: {}
tags:
  - name: Books
