{
  "openapi": "3.0.0",
  "info": {
    "title": "Book Management API",
    "description": "A simple API to manage a collection of books, for SOA courses demo.",
    "version": "1.0.0"
  },
  "servers": [
    {
      "url": "http://127.0.0.1:5000"
    }
  ],
  "paths": {
    "/api/books": {
      "get": {
        "description": "Get all books",
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Book"
                  }
                }
              }
            }
          }
        }
      },
      "post": {
        "description": "Add a new book",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "$ref": "#/components/schemas/NewBook"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Book created successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "$ref": "#/components/schemas/Book"
                }
              }
            }
          },
          "400": {
            "description": "Missing title or author"
          }
        }
      }
    },
    "/api/books/{book_id}": {
      "parameters": [
        {
          "name": "book_id",
          "description": "ID of the book to retrieve, update, or delete",
          "required": true,
          "in": "path",
          "schema": {
            "description": "ID of the book to retrieve, update, or delete",
            "type": "integer"
          }
        }
      ],
      "get": {
        "description": "Get a book by its ID",
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "$ref": "#/components/schemas/Book"
                }
              }
            }
          },
          "404": {
            "description": "Book not found"
          }
        }
      },
      "put": {
        "description": "Update an existing book",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "$ref": "#/components/schemas/NewBook"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Book updated successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "$ref": "#/components/schemas/Book"
                }
              }
            }
          },
          "400": {
            "description": "Missing title or author"
          },
          "404": {
            "description": "Book not found"
          }
        }
      },
      "delete": {
        "description": "Delete a book",
        "responses": {
          "204": {
            "description": "Book deleted successfully"
          },
          "404": {
            "description": "Book not found"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "Book": {
        "type": "object",
        "required": [
          "id",
          "title",
          "author"
        ],
        "properties": {
          "id": {
            "description": "The unique identifier of the book.",
            "type": "integer"
          },
          "title": {
            "description": "The title of the book.",
            "type": "string"
          },
          "author": {
            "description": "The author of the book.",
            "type": "string"
          }
        }
      },
      "NewBook": {
        "type": "object",
        "required": [
          "title",
          "author"
        ],
        "properties": {
          "title": {
            "type": "string"
          },
          "author": {
            "type": "string"
          }
        }
      }
    }
  }
}