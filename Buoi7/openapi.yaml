openapi: 3.0.3
info:
  title: Library Management API (Buoi7)
  description: A Library Management REST API with User, Book, and Loan modules.
  version: "1.0.0"

servers:
  - url: http://127.0.0.1:8081
    description: Local development server

components:
  parameters:
    userId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
      description: Unique user identifier
    bookId:
      name: book_id
      in: path
      required: true
      schema:
        type: integer
      description: Unique book identifier
    loanId:
      name: loan_id
      in: path
      required: true
      schema:
        type: integer
      description: Unique loan identifier

  schemas:
    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Nguyen Van A" }
        email: { type: string, example: "nguyenvana@example.com" }

    UserCreate:
      type: object
      required: [name, email]
      properties:
        name: { type: string, example: "Nguyen Van A" }
        email: { type: string, example: "nguyenvana@example.com" }

    Book:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: "Clean Code" }
        author: { type: string, example: "Robert C. Martin" }
        category: { type: string, example: "Software Engineering" }
        available_copies: { type: integer, example: 3 }

    BookCreate:
      type: object
      required: [title, author, category]
      properties:
        title: { type: string, example: "Clean Code" }
        author: { type: string, example: "Robert C. Martin" }
        category: { type: string, example: "Software Engineering" }
        available_copies: { type: integer, example: 3, default: 1 }

    Loan:
      type: object
      properties:
        id: { type: integer, example: 1 }
        user_id: { type: integer, example: 1 }
        book_id: { type: integer, example: 1 }
        borrow_date: { type: string, format: date-time, example: "2026-03-26T04:00:00" }
        return_date: { type: string, format: date-time, nullable: true, example: null }

    BorrowRequest:
      type: object
      required: [user_id, book_id]
      properties:
        user_id: { type: integer, example: 1 }
        book_id: { type: integer, example: 1 }

    Error:
      type: object
      properties:
        error: { type: string, example: "Error message" }

paths:
  # ── Users ──────────────────────────────────────────────────────────────
  /api/users:
    get:
      tags: [Users]
      summary: List all users
      operationId: getUsers
      responses:
        "200":
          description: A list of users
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } }
    post:
      tags: [Users]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
        "400":
          description: Missing fields
        "409":
          description: Email exists

  /api/users/{user_id}:
    parameters:
      - $ref: "#/components/parameters/userId"
    get:
      tags: [Users]
      summary: Get a user by ID
      operationId: getUser
      responses:
        "200":
          description: User details
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
        "404":
          description: User not found
    put:
      tags: [Users]
      summary: Update a user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "200":
          description: User updated
    delete:
      tags: [Users]
      summary: Delete a user
      operationId: deleteUser
      responses:
        "200":
          description: User deleted

  # ── Books ──────────────────────────────────────────────────────────────
  /api/books:
    get:
      tags: [Books]
      summary: List all books
      operationId: getBooks
      parameters:
        - name: category
          in: query
          schema: { type: string }
          description: Filter by category
        - name: author
          in: query
          schema: { type: string }
          description: Filter by author
      responses:
        "200":
          description: List of books
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Book" } } } }
    post:
      tags: [Books]
      summary: Create a new book
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
      responses:
        "201":
          description: Book created

  /api/books/{book_id}:
    parameters:
      - $ref: "#/components/parameters/bookId"
    get:
      tags: [Books]
      summary: Get book by ID
      responses:
        "200":
          description: Book details
          content: { application/json: { schema: { $ref: "#/components/schemas/Book" } } }
    put:
      tags: [Books]
      summary: Update a book
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BookCreate" } } }
      responses:
        "200":
          description: Updated book
    delete:
      tags: [Books]
      summary: Delete a book
      responses:
        "200":
          description: Book deleted

  # ── Loans ──────────────────────────────────────────────────────────────
  /api/loans:
    get:
      tags: [Loans]
      summary: List all loans
      parameters:
        - name: user_id
          in: query
          schema: { type: integer }
        - name: active
          in: query
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200":
          description: List of loans
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Loan" } } } }

  /api/loans/{loan_id}:
    parameters:
      - $ref: "#/components/parameters/loanId"
    get:
      tags: [Loans]
      summary: Get loan by ID
      responses:
        "200":
          description: Loan details
          content: { application/json: { schema: { $ref: "#/components/schemas/Loan" } } }

  /api/loans/borrow:
    post:
      tags: [Loans]
      summary: Borrow a book
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BorrowRequest" } } }
      responses:
        "201":
          description: Loan created

  /api/loans/{loan_id}/return:
    parameters:
      - $ref: "#/components/parameters/loanId"
    post:
      tags: [Loans]
      summary: Return a book
      responses:
        "200":
          description: Book returned
